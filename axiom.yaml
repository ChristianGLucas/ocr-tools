name: christiangeorgelucas/ocr-tools
version: 0.2.0
language: python
description: Composable Axiom optical character recognition nodes (full recognition with per-line boxes + confidence, plain-text extraction, detection-only region finding, upside-down page detection + correction, and caller-scoped per-region recognition) over a single Image envelope shared with image-tools, wrapping the vendored Apache-2.0 RapidOCR / PP-OCRv4 ONNX engine. Offline (models bundled, no network), deterministic, headless, with hard size bounds and an SSRF-guarded URL fetch on untrusted input.
nodes:
    - name: Recognize
      description: Detect and recognize all text in an image, returning the full concatenated text plus, for every line, its recognized string, recognition confidence in [0,1], axis-aligned bounding box (pixels, top-left origin), and the raw detection quadrilateral that preserves rotated or skewed text. Also returns the mean confidence and line count. Malformed, oversized (>20 MB or >40 megapixels), or unfetchable input returns a structured error rather than crashing. Wraps the Apache-2.0 RapidOCR / PP-OCRv4 detection+recognition pipeline.
      input: Image
      output: OcrResult
    - name: ExtractText
      description: Recognize all text in an image and return it as a single plain string, lines joined in reading order by newlines — a clean edge into text or NLP nodes downstream. Returns no geometry or confidence (use Recognize for those). Malformed, oversized, or unfetchable input returns a structured error rather than crashing. Wraps the Apache-2.0 RapidOCR / PP-OCRv4 engine.
      input: Image
      output: TextOut
    - name: DetectRegions
      description: Locate text regions in an image without recognizing their contents — a fast "where is the text" pass for layout analysis, cropping, or routing. Each region carries its axis-aligned bounding box (pixels, top-left origin) and the raw detection quadrilateral, plus a total count. Malformed, oversized, or unfetchable input returns a structured error rather than crashing. Wraps the detection stage of the Apache-2.0 RapidOCR / PP-OCRv4 engine.
      input: Image
      output: RegionsOut
    - name: CorrectOrientation
      description: Detect whether an image's text is upside-down (0° vs. 180°, PP-OCRv4's angle-classification model) and, if so, rotate the image to correct it; otherwise return it unchanged. Returns the (possibly rotated) image re-encoded as bytes/format/width/height, whether a correction was applied, and the classifier's confidence in [0,1]. Best applied to a single text line or a tight region crop (the classifier is trained on line-height crops); accuracy on a full multi-line page is lower but still directionally useful. Malformed, oversized (>20 MB or >40 megapixels), or unfetchable input returns a structured error rather than crashing. Wraps PP-OCRv4's angle-classification stage of the Apache-2.0 RapidOCR engine.
      input: Image
      output: OrientationResult
    - name: RecognizeRegion
      description: Recognize text within a single caller-specified rectangular region of an image, skipping detection entirely — pairs directly with DetectRegions' output (feed a returned region straight back in) or any externally known field position (e.g. a fixed form field), without re-running detection over the whole image. The region is clamped to the image bounds; a region with zero area after clamping returns a structured error. Malformed, oversized, or unfetchable input, or a degenerate region, returns a structured error rather than crashing. Wraps the classification+recognition stages of the Apache-2.0 RapidOCR / PP-OCRv4 engine on the caller-supplied crop.
      input: RecognizeRegionInput
      output: RegionText
imports:
    - package: christiangeorgelucas/image-tools
      version: 0.1.0
      messages:
        - Image
