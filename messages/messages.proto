// Data contracts for christiangeorgelucas/ocr-tools — stateless optical
// character recognition wrapping the Apache-2.0 RapidOCR / PP-OCRv4 ONNX engine.
//
// COMPOSABILITY. Every node consumes the SAME `Image` envelope that
// christiangeorgelucas/image-tools defines — imported directly (see `imports:`
// in axiom.yaml), not re-declared — so an image-tools node's `Image` output
// flows straight into an ocr-tools node with no adapter, and both packages'
// nodes share one type in a compiled flow. That envelope carries raw `data`
// bytes (base64 over JSON) or, when `data` is empty, an INPUT-ONLY `url` the
// node fetches (SSRF-guarded, capped at 20 MB before decode).
//
// COORDINATES. All bounding boxes below are in PIXELS with the origin at the
// TOP-LEFT of the image (the raster convention RapidOCR uses). Note this
// differs from christiangeorgelucas/pdf-tools, whose boxes are in PDF points
// with the origin BOTTOM-LEFT — deliberately not homogenized, because the two
// operate on different media.

syntax = "proto3";

package christiangeorgelucas.ocr_tools;

// A point in pixel coordinates, origin top-left.
message Point {
  // X (horizontal) offset in pixels from the left edge.
  double x = 1;
  // Y (vertical) offset in pixels from the top edge.
  double y = 2;
}

// One detected and recognized line of text with its geometry and confidence.
message TextLine {
  // The recognized text of this line.
  string text = 1;
  // Recognition confidence in [0, 1]; higher is more certain.
  double confidence = 2;
  // Left edge (min x) of the axis-aligned bounding box, in pixels.
  double x0 = 3;
  // Top edge (min y) of the axis-aligned bounding box, in pixels.
  double y0 = 4;
  // Right edge (max x) of the axis-aligned bounding box, in pixels.
  double x1 = 5;
  // Bottom edge (max y) of the axis-aligned bounding box, in pixels.
  double y1 = 6;
  // The raw detection quadrilateral (4 points, clockwise from the top-left
  // corner). Preserved because detected text may be rotated or skewed, so the
  // exact polygon carries more than the axis-aligned box.
  repeated Point quad = 7;
}

// Full OCR result: recognized text plus per-line geometry and confidence.
message OcrResult {
  // All recognized lines joined in reading order, one per line ('\n'-separated).
  string text = 1;
  // The recognized lines, each with its bounding box, quad, and confidence,
  // in RapidOCR's detection order (top-to-bottom, left-to-right).
  repeated TextLine lines = 2;
  // Mean recognition confidence across all lines, in [0, 1]; 0 when no text.
  double mean_confidence = 3;
  // Number of recognized lines (== length of `lines`).
  int32 line_count = 4;
  // Structured error message; empty on success. Set instead of raising on
  // malformed, oversized, or unfetchable input.
  string error = 5;
}

// Plain-text-only OCR output — a clean edge into text / NLP nodes downstream.
message TextOut {
  // All recognized text joined in reading order ('\n'-separated). Empty when
  // no text is found.
  string text = 1;
  // Structured error message; empty on success.
  string error = 2;
}

// A detected text region (geometry only, no recognition).
message Region {
  // Left edge (min x) of the axis-aligned bounding box, in pixels.
  double x0 = 1;
  // Top edge (min y) of the axis-aligned bounding box, in pixels.
  double y0 = 2;
  // Right edge (max x) of the axis-aligned bounding box, in pixels.
  double x1 = 3;
  // Bottom edge (max y) of the axis-aligned bounding box, in pixels.
  double y1 = 4;
  // The raw detection quadrilateral (4 points, clockwise from the top-left).
  repeated Point quad = 5;
}

// Detected text regions with no recognition performed — a fast "where is the
// text" pass for layout analysis, cropping, or routing.
message RegionsOut {
  // Detected regions in RapidOCR's detection order.
  repeated Region regions = 1;
  // Number of regions (== length of `regions`).
  int32 count = 2;
  // Structured error message; empty on success.
  string error = 3;
}
