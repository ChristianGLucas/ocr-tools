// Data contracts for christiangeorgelucas/ocr-tools — stateless optical
// character recognition wrapping the Apache-2.0 RapidOCR / PP-OCRv4 ONNX engine.
//
// COMPOSABILITY. Every node consumes the SAME `Image` envelope that
// christiangeorgelucas/image-tools defines — imported directly (see `imports:`
// in axiom.yaml), not re-declared — so an image-tools node's `Image` output
// flows straight into an ocr-tools node with no adapter, and both packages'
// nodes share one type in a compiled flow. That envelope carries raw `data`
// bytes (base64 over JSON) or, when `data` is empty, an INPUT-ONLY `url` the
// node fetches (SSRF-guarded, capped at 20 MB before decode).
//
// COORDINATES. All bounding boxes below are in PIXELS with the origin at the
// TOP-LEFT of the image (the raster convention RapidOCR uses). Note this
// differs from christiangeorgelucas/pdf-tools, whose boxes are in PDF points
// with the origin BOTTOM-LEFT — deliberately not homogenized, because the two
// operate on different media.

syntax = "proto3";

package christiangeorgelucas.ocr_tools;

// A point in pixel coordinates, origin top-left.
message Point {
  // X (horizontal) offset in pixels from the left edge.
  double x = 1;
  // Y (vertical) offset in pixels from the top edge.
  double y = 2;
}

// One detected and recognized line of text with its geometry and confidence.
message TextLine {
  // The recognized text of this line.
  string text = 1;
  // Recognition confidence in [0, 1]; higher is more certain.
  double confidence = 2;
  // Left edge (min x) of the axis-aligned bounding box, in pixels.
  double x0 = 3;
  // Top edge (min y) of the axis-aligned bounding box, in pixels.
  double y0 = 4;
  // Right edge (max x) of the axis-aligned bounding box, in pixels.
  double x1 = 5;
  // Bottom edge (max y) of the axis-aligned bounding box, in pixels.
  double y1 = 6;
  // The raw detection quadrilateral (4 points, clockwise from the top-left
  // corner). Preserved because detected text may be rotated or skewed, so the
  // exact polygon carries more than the axis-aligned box.
  repeated Point quad = 7;
}

// Full OCR result: recognized text plus per-line geometry and confidence.
message OcrResult {
  // All recognized lines joined in reading order, one per line ('\n'-separated).
  string text = 1;
  // The recognized lines, each with its bounding box, quad, and confidence,
  // in RapidOCR's detection order (top-to-bottom, left-to-right).
  repeated TextLine lines = 2;
  // Mean recognition confidence across all lines, in [0, 1]; 0 when no text.
  double mean_confidence = 3;
  // Number of recognized lines (== length of `lines`).
  int32 line_count = 4;
  // Structured error message; empty on success. Set instead of raising on
  // malformed, oversized, or unfetchable input.
  string error = 5;
}

// Plain-text-only OCR output — a clean edge into text / NLP nodes downstream.
message TextOut {
  // All recognized text joined in reading order ('\n'-separated). Empty when
  // no text is found.
  string text = 1;
  // Structured error message; empty on success.
  string error = 2;
}

// A detected text region (geometry only, no recognition).
message Region {
  // Left edge (min x) of the axis-aligned bounding box, in pixels.
  double x0 = 1;
  // Top edge (min y) of the axis-aligned bounding box, in pixels.
  double y0 = 2;
  // Right edge (max x) of the axis-aligned bounding box, in pixels.
  double x1 = 3;
  // Bottom edge (max y) of the axis-aligned bounding box, in pixels.
  double y1 = 4;
  // The raw detection quadrilateral (4 points, clockwise from the top-left).
  repeated Point quad = 5;
}

// Detected text regions with no recognition performed — a fast "where is the
// text" pass for layout analysis, cropping, or routing.
message RegionsOut {
  // Detected regions in RapidOCR's detection order.
  repeated Region regions = 1;
  // Number of regions (== length of `regions`).
  int32 count = 2;
  // Structured error message; empty on success.
  string error = 3;
}

// Output of CorrectOrientation. NOTE ON COMPOSABILITY: this deliberately
// mirrors christiangeorgelucas/image-tools' `Image` fields (data/format/
// width/height) by NAME rather than embedding the imported `Image` type,
// because `axiom generate` does not currently resolve a cross-package
// message type nested inside a new local message (only bare top-level node
// input/output types resolve — see the 3 existing nodes). A flow edge into
// an image-tools node is a plain 4-field map (data/format/width/height),
// same as any other adapter. Ticket filed against the platform gap.
message OrientationResult {
  // Image bytes, rotated 180° if upside-down text was detected; otherwise
  // byte-identical to the input. Re-encoded in `format`.
  bytes data = 1;
  // Encoding of `data`: one of "PNG", "JPEG", "WEBP", "GIF", "BMP", "TIFF" —
  // the input's own format when detectable, else "PNG".
  string format = 2;
  // Width in pixels of the (possibly rotated) image. 180° rotation never
  // changes width/height, so this always equals the input's width.
  int32 width = 3;
  // Height in pixels of the (possibly rotated) image.
  int32 height = 4;
  // True if the angle classifier detected upside-down (180°) text and
  // `data` was rotated to correct it; false if the image was already
  // right-side up (or had no text confident enough to judge).
  bool rotated = 5;
  // The angle classifier's confidence in its chosen label, in [0, 1].
  double confidence = 6;
  // Structured error message; empty on success.
  string error = 7;
}

// Input for RecognizeRegion: a caller-specified rectangular region of an
// image to crop and recognize, skipping detection entirely. Pairs naturally
// with DetectRegions' output (feed a returned `Region` straight back in) or
// any externally known field position (e.g. a fixed form field). Mirrors
// image-tools' `Image` fields by name for the same reason as
// `OrientationResult` above (embedding the imported type is not yet
// supported for nested composition).
message RecognizeRegionInput {
  // Raw bytes of the full image to crop from (base64 over JSON). Same
  // convention as christiangeorgelucas/image-tools' `Image.data`.
  bytes data = 1;
  // Encoding of `data`. Optional; auto-detected from the bytes if empty.
  string format = 2;
  // INPUT-ONLY. If `data` is empty, the image is fetched from this URL
  // (SSRF-guarded, same bound as every other ocr-tools node).
  string url = 3;
  // The rectangle to crop, in the same pixel/top-left convention as
  // `Region`. Only the axis-aligned box (x0/y0/x1/y1) is used; `quad`, if
  // set, is ignored — rotation within the crop is handled by the
  // recognizer's own angle classifier, not by a perspective warp of the
  // crop. The rectangle is clamped to the image bounds.
  Region region = 4;
}

// Recognition result for a single caller-specified region (no geometry
// echoed back, since the caller already supplied it).
message RegionText {
  // The recognized text of the region. Empty if no text was found.
  string text = 1;
  // Recognition confidence in [0, 1]; 0 when no text was found.
  double confidence = 2;
  // Structured error message; empty on success.
  string error = 3;
}
